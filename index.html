<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站建设中</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:微软雅黑,黑体;
            background:#f5f5f5;
            text-align:center;
            padding-top:120px;
        }
        .box{
            background:#fff;
            width:90%;
            max-width:500px;
            margin:0 auto;
            padding:50px 20px;
            border-radius:10px;
            box-shadow:0 0 10px #eee;
        }
        h1{
            color:#333;
            font-size:28px;
            margin-bottom:20px;
        }
        p{
            color:#666;
            font-size:16px;
            line-height:1.8;
        }
        .icp{
            margin-top:30px;
            font-size:14px;
            color:#999;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>网站正在建设中</h1>
        <p>本站暂未正式上线，敬请期待...</p >
    </div>
    <div class="icp">
        备案号：沪ICP备2026018991号-1
    </div>
</body>
</html>
